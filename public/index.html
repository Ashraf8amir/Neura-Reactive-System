<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Auth with Role Selection</title>
</head>
<body>
  <h1>Google Auth Flow</h1>

  <!-- Step 1: Google Login -->
  <button id="googleLoginBtn">Login with Google</button>

  <!-- Step 2: Show Result -->
  <pre id="result"></pre>

  <!-- Step 3: Role Selection -->
  <div id="roleSelection" style="display: none;">
    <h3>Complete Your Registration</h3>
    <p><strong>Email:</strong> <span id="googleEmail"></span></p>
    <p><strong>Name:</strong> <span id="googleName"></span></p>

    <label for="roleSelect">Role:</label>
    <select id="roleSelect">
      <option value="">Select role</option>
      <option value="doctor">Doctor</option>
      <option value="patient">Patient</option>
      <option value="nurse">Nurse</option>
      <option value="pharmacy">Pharmacy</option>
    </select>

    <label for="genderSelect">Gender:</label>
    <select id="genderSelect">
      <option value="">Select gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <label for="dobInput">Date of Birth:</label>
    <input type="date" id="dobInput" />

    <button id="completeBtn">Complete Registration</button>
  </div>

  <script>
    const apiBase = "http://localhost:3070/api/v1/auth";
    let googleUserInfo = null;
    let tempToken = null;

    // Step 1: Get Google Auth URL
    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      try {
        const res = await fetch(`${apiBase}/google-auth-url`, {
          method: "GET",
          credentials: "include"
        });
        const data = await res.json();

        if (data.status?.toLowerCase() === "success" && data.data.url) {
          window.location.href = data.data.url;
        } else {
          document.getElementById("result").innerText = "Error getting Google URL";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "Request failed";
      }
    });

    // Step 2: Handle Google Callback
    window.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
            console.log("params----------------> "+params)

      if (params.has("code") && params.has("state")) {
        try {
          const res = await fetch(`${apiBase}/google-callback?${params.toString()}`, {
            credentials: "include"
          });
          const data = await res.json();
            console.log("data----------------> "+JSON.stringify(data))
          if (data.status?.toLowerCase() === "success") {
            console.log("data.status--> "+data.status)
            if (data.data.isNewUser) {
              tempToken = data.data.tempToken;
              googleUserInfo = data.data.userInfo || {};
              document.getElementById("googleEmail").innerText = googleUserInfo.email || "";
              document.getElementById("googleName").innerText =
                `${googleUserInfo.firstName || ""} ${googleUserInfo.lastName || ""}`.trim();
              document.getElementById("roleSelection").style.display = "block";
            } else {
              document.getElementById("result").innerText = 
                `Welcome Back,`;
            }
          }
        } catch (err) {
          console.error(err);
          document.getElementById("result").innerText = "Callback failed";
        }
      }
    });

    // Step 3: Complete Registration
    async function completeRegistration() {
      const role = document.getElementById("roleSelect").value;
      const gender = document.getElementById("genderSelect").value;
      const dateOfBirth = document.getElementById("dobInput").value;

      if (!role || !gender || !dateOfBirth) {
        document.getElementById("result").innerText = "Please select role, gender, and date of birth.";
        return;
      }

      if (!tempToken) {
        document.getElementById("result").innerText = "Missing temporary token. Please restart the Google login flow.";
        return;
      }

      try {
        const res = await fetch(`${apiBase}/complete-google-registration`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            role,
            gender,
            dateOfBirth,
            tempToken: tempToken
          })
        });

        const data = await res.json();
        document.getElementById("result").innerText = JSON.stringify(data, null, 2);
        document.getElementById("roleSelection").style.display = "none";
        tempToken = null;
        googleUserInfo = null;
      } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "Role selection failed";
      }
    }

    document.getElementById("completeBtn").onclick = () => completeRegistration();
  </script>
</body>
</html>
